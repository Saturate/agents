# skill-router PreToolUse Bash advisor rules
#
# Format: <extended-regex><TAB><comma-separated-skill-names>
# Lines beginning with # and blank lines are ignored.
# Regex is matched against .tool_input.command with `grep -E`.
# Match → emit the named skill(s) as advisory context (dedupe per session).
#
# Keep these high-signal only. Every rule here is a false-positive tax on
# the model's context window.

# Package installation (named package, not bare restore)
^[[:space:]]*(npm|pnpm|yarn|bun)[[:space:]]+(install|add|i)[[:space:]]+[^-[:space:]]	evaluating-dependencies
^[[:space:]]*cargo[[:space:]]+add[[:space:]]+[^-[:space:]]	evaluating-dependencies
^[[:space:]]*(pip|pip3|uv)[[:space:]]+(install|add)[[:space:]]+[^-[:space:]]	evaluating-dependencies
^[[:space:]]*go[[:space:]]+get[[:space:]]+[^[:space:]]+@	evaluating-dependencies
^[[:space:]]*dotnet[[:space:]]+add[[:space:]]+package[[:space:]]+[^-[:space:]]	evaluating-dependencies,nuget-package-management

# Commits
^[[:space:]]*git[[:space:]]+commit	commit
