# skill-router PreToolUse Bash advisor rules
#
# Format: <action><TAB><extended-regex><TAB><skill-names>[<TAB><message>]
#
# Actions:
#   block — Blocks the tool call. Model must invoke the skill, then re-run
#           the command with SKILL_ACK=<skill> prefix to pass through.
#   flow  — Non-blocking advisory (additionalContext). Suggests a skill
#           for the NEXT likely step in the workflow.
#
# Lines beginning with # and blank lines are ignored.
# Regex is matched against .tool_input.command with `grep -E`.

# Package installation (named package, not bare restore)
block	^[[:space:]]*(npm|pnpm|yarn|bun)[[:space:]]+(install|add|i)[[:space:]]+[^-[:space:]]	evaluating-dependencies
block	^[[:space:]]*cargo[[:space:]]+add[[:space:]]+[^-[:space:]]	evaluating-dependencies
block	^[[:space:]]*(pip|pip3|uv)[[:space:]]+(install|add)[[:space:]]+[^-[:space:]]	evaluating-dependencies
block	^[[:space:]]*go[[:space:]]+get[[:space:]]+[^[:space:]]+@	evaluating-dependencies
block	^[[:space:]]*dotnet[[:space:]]+add[[:space:]]+package[[:space:]]+[^-[:space:]]	evaluating-dependencies,nuget-package-management

# Commits
block	^[[:space:]]*git[[:space:]]+commit	commit

# Pull requests — block as safety net, flow advisory on push
block	^[[:space:]]*gh[[:space:]]+pr[[:space:]]+create	make-pr
block	^[[:space:]]*az[[:space:]]+repos[[:space:]]+pr[[:space:]]+create	make-pr
flow	^[[:space:]]*git[[:space:]]+push	make-pr	If you're about to create a PR next, invoke `/make-pr` — it generates context-aware descriptions from your commits.

# Destructive recursive deletion
block	^[[:space:]]*rm[[:space:]]+(-[[:alpha:]]+[[:space:]]+)*(--recursive|-[[:alpha:]]*r)	safe-delete
