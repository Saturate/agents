# skill-router PreToolUse Bash advisor rules
#
# Format: <action><TAB><extended-regex><TAB><skill-or-gate-name>[<TAB><message>]
#
# Actions:
#   block — Blocks the tool call. Model must invoke the skill, then re-run
#           the command with SKILL_ACK=<skill> prefix to pass through.
#   gate  — Blocks the tool call with a custom message (no skill needed).
#           Model must show the user what it's about to do, get explicit
#           approval, then re-run with SKILL_ACK=<gate-name> prefix.
#   flow  — Non-blocking advisory (additionalContext). Suggests a skill
#           for the NEXT likely step in the workflow.
#
# First block/gate match wins. Order specific rules before general ones.
# Lines beginning with # and blank lines are ignored.
# Regex is matched against .tool_input.command with `grep -E`.

# ── External-facing content (gate: draft first, then post) ──────────
# These fire BEFORE the skill-based blocks below. Creating an issue or
# commenting on a PR is external-facing — show the user a draft first.
gate	^[[:space:]]*gh[[:space:]]+issue[[:space:]]+create	draft-first	This creates a public issue. Show the user the exact title and body you will post. Wait for explicit approval. Then re-run with SKILL_ACK=draft-first prefix.
gate	^[[:space:]]*gh[[:space:]]+pr[[:space:]]+review	draft-first	This posts a review on someone else's PR. Show the user the review content first. Wait for explicit approval. Then re-run with SKILL_ACK=draft-first prefix.
gate	^[[:space:]]*gh[[:space:]]+pr[[:space:]]+comment	draft-first	This posts a public comment. Show the user the comment content first. Wait for explicit approval. Then re-run with SKILL_ACK=draft-first prefix.
gate	^[[:space:]]*az[[:space:]]+repos[[:space:]]+pr[[:space:]]+create[[:space:]]+-+thread	draft-first	This posts a comment on an Azure DevOps PR. Show the user the content first. Wait for explicit approval. Then re-run with SKILL_ACK=draft-first prefix.

# ── Destructive git operations (gate: confirm before proceeding) ─────
# Force push and hard reset can destroy history/work. Order these BEFORE
# the general git push block so they get a different, stronger message.
gate	^[[:space:]]*git[[:space:]]+push[[:space:]]+.*(-f|--force)	confirm-destructive	This force-pushes, which rewrites remote history. Tell the user which branch and remote you are targeting and why a force push is needed. Wait for explicit approval. Then re-run with SKILL_ACK=confirm-destructive prefix.
gate	^[[:space:]]*git[[:space:]]+reset[[:space:]]+--hard	confirm-destructive	git reset --hard discards uncommitted changes permanently. Tell the user what will be lost. Wait for explicit approval. Then re-run with SKILL_ACK=confirm-destructive prefix.

# ── Irreversible external actions (gate: confirm) ───────────────────
gate	^[[:space:]]*gh[[:space:]]+repo[[:space:]]+fork	confirm-external	This forks a repository to your GitHub account (irreversible). Tell the user which repo you are forking and why. Wait for explicit approval. Then re-run with SKILL_ACK=confirm-external prefix.

# ── Package installation (block: invoke evaluating-dependencies) ─────
block	^[[:space:]]*(npm|pnpm|yarn|bun)[[:space:]]+(install|add|i)[[:space:]]+[^-[:space:]]	evaluating-dependencies
block	^[[:space:]]*cargo[[:space:]]+add[[:space:]]+[^-[:space:]]	evaluating-dependencies
block	^[[:space:]]*(pip|pip3|uv)[[:space:]]+(install|add)[[:space:]]+[^-[:space:]]	evaluating-dependencies
block	^[[:space:]]*go[[:space:]]+get[[:space:]]+[^[:space:]]+@	evaluating-dependencies
block	^[[:space:]]*dotnet[[:space:]]+add[[:space:]]+package[[:space:]]+[^-[:space:]]	evaluating-dependencies,nuget-package-management

# ── Commits (block: invoke commit skill) ─────────────────────────────
block	^[[:space:]]*git[[:space:]]+commit	commit

# ── Pull requests and push (block: invoke skill) ────────────────────
block	^[[:space:]]*gh[[:space:]]+pr[[:space:]]+create	make-pr
block	^[[:space:]]*az[[:space:]]+repos[[:space:]]+pr[[:space:]]+create	make-pr
block	^[[:space:]]*git[[:space:]]+push	push

# ── Destructive recursive deletion (block: invoke safe-delete) ───────
block	^[[:space:]]*rm[[:space:]]+(-[[:alpha:]]+[[:space:]]+)*(--recursive|-[[:alpha:]]*r)	safe-delete
